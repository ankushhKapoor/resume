name: Build and Upload LaTeX Resume

on:
  push:
  workflow_dispatch:  # Enable manual Run workflow button

jobs:
  build_latex:
    runs-on: ubuntu-latest

    # outputs:
    # deployed: ${{ steps.push_check.outputs.deployed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert PDF to PNG
        run: |
          sudo apt update
          sudo apt install -y poppler-utils
          rm -rf Ankush_Kapoor_Resume.png
          pdftoppm -rx 300 -ry 300 "Ankush_Kapoor_Resume.pdf" resume -png
          mv "resume-1.png" "Ankush_Kapoor_Resume.png"
          
      - name: Commit and push changes
        id: push_check
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # echo "<!-- updated at $(date) -->" >> index.html

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update Resume PDF and PNG files"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git pull --rebase origin main
            git push
            # echo "deployed=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

